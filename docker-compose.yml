version: '3.8'

services:
  dashboard:
    build: .
    container_name: dashboard-ubuntu
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /:/host/root:ro
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /etc/os-release:/etc/os-release:ro
    environment:
      - PORT=9091
    env_file:
      - .env
